---
# secured-claude — top-level GitLab CI/CD pipeline (ADR-0014, ADR-0017).
#
# This file just declares the pipeline structure. The actual jobs live in
# .gitlab-ci/*.yml — one file per concern, included below.
#
# Runner : macbook-local (per CLAUDE.md global "use local runners ; never
# rely on GitLab SaaS quota"). Same pattern as iris-service-python.
#
# Conventional Commits enforced ; auto-merge dev → main when pipeline green.

stages:
  - lint            # ruff + mypy + hadolint + shellcheck + cerbos compile + commitlint
  - test            # pytest matrix (3.11 / 3.12 / 3.13) + coverage gate ≥ 90%
  - security        # bandit, pip-audit, gitleaks, grype, trivy, audit-demo, sbom
  - build           # uv build (wheel + sdist) + docker buildx
  - publish         # GitLab Package Registry (PyPI), Container Registry, cosign
  - release         # GitLab Release with CHANGELOG + signed assets (only on tags)

# ---------------------------------------------------------------------------
# Defaults
# ---------------------------------------------------------------------------

default:
  tags:
    - macbook-local           # Apple Silicon arm64 runner (per CLAUDE.md global)
  interruptible: true
  timeout: 30 minutes
  before_script:
    - export PATH="$HOME/.local/bin:/opt/homebrew/bin:$PATH"
    - export UV_LINK_MODE=copy

# ---------------------------------------------------------------------------
# Cache anchors — referenced by every job that needs them.
#
# Cache strategy (ADR-0017 §"Caching") :
#   * uv-lock cache : .venv/ + uv-managed cache. Key tied to uv.lock so any
#     dep change triggers a fresh install (correct), but identical dep sets
#     reuse the venv (fast).
#   * scan cache : ~/.cache/secured-claude-scan/ for grype, trivy, pip-audit
#     vulnerability DBs. Refresh cadence ~daily (the scanners themselves
#     check for newer DBs and pull only the delta).
#   * mypy cache, ruff cache : in-repo, gitignored. Tied to source tree.
# ---------------------------------------------------------------------------

.cache-uv: &cache-uv
  cache:
    - key:
        files: [uv.lock]
      paths:
        - .venv/
        - .uv-cache/
      policy: pull-push

.cache-scan-dbs: &cache-scan-dbs
  cache:
    - key: scan-dbs-v1
      paths:
        - .cache-scan/
      policy: pull-push

.cache-incremental: &cache-incremental
  cache:
    - key: incremental-${CI_COMMIT_REF_SLUG}
      paths:
        - .ruff_cache/
        - .mypy_cache/
        - .pytest_cache/
      policy: pull-push

# Aggregate when a job needs both deps and incremental
.cache-uv-incremental: &cache-uv-incremental
  cache:
    - key:
        files: [uv.lock]
      paths: [.venv/, .uv-cache/]
      policy: pull-push
    - key: incremental-${CI_COMMIT_REF_SLUG}
      paths: [.ruff_cache/, .mypy_cache/, .pytest_cache/]
      policy: pull-push

# ---------------------------------------------------------------------------
# Includes
# ---------------------------------------------------------------------------

include:
  - local: .gitlab-ci/lint.yml
  - local: .gitlab-ci/test.yml
  - local: .gitlab-ci/security.yml
  - local: .gitlab-ci/build.yml
  - local: .gitlab-ci/publish.yml
  - local: .gitlab-ci/release.yml

# ---------------------------------------------------------------------------
# Workflow rules — what triggers a pipeline
# ---------------------------------------------------------------------------

workflow:
  rules:
    # Run on tag pushes (release pipeline)
    - if: $CI_COMMIT_TAG
    # Run on default branch (post-merge to main)
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    # Run on dev branch
    - if: $CI_COMMIT_BRANCH == "dev"
    # Run on every MR
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # Skip duplicates : if a branch has an open MR, don't run the branch
    # pipeline too (the MR pipeline is the source of truth).
    - if: $CI_OPEN_MERGE_REQUESTS != null
      when: never
