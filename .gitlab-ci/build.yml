---
# Build stage — Python wheel + sdist + multi-arch container images.
#
# v0.4.0 (ADR-0028) ships true multi-arch images : every release tag has a
# manifest-list pointing at native linux/amd64 + linux/arm64 manifests.
# Apple Silicon / AWS Graviton users get native arm64 ; everyone else
# gets amd64. No more QEMU emulation overhead at runtime.
#
# Pipeline structure :
#   * On dev / MR / main : build amd64 only (cheap iteration loop).
#   * On tag : build amd64 + arm64 in parallel, then `crane index append`
#     combines them into a manifest-list under the canonical tag.
#   * Cosign signs the canonical tag (= the manifest index) ; the
#     signature covers both arches per cosign-on-manifest-list semantics.

build:python:
  stage: build
  image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
  cache:
    - key:
        files: [uv.lock]
      paths: [.venv/, .uv-cache/]
      policy: pull-push
  before_script:
    # hatch-vcs reads the package version from the latest git tag (ADR-0018).
    # The bookworm-slim image doesn't bundle git ; install it so `uv build`
    # can resolve the version. The Kaniko build:image jobs use a different
    # base and don't need this.
    - apt-get update -qq && apt-get install -y --no-install-recommends git
    # GitLab clones with depth=20 by default — ensure the tag is reachable.
    - git fetch --tags --depth=100 || true
    - uv sync --all-extras --frozen
  script:
    - uv build
    - ls -la dist/
  artifacts:
    paths: [dist/]
    expire_in: 90 days

# ---------------------------------------------------------------------------
# Hidden template — Kaniko + per-arch destination tag scheme.
# Concrete jobs extend this with IMAGE_NAME, DOCKERFILE, ARCH, RULES vars.
# ---------------------------------------------------------------------------

.kaniko-build-base:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - |
      cat > /kaniko/.docker/config.json <<EOF
      {"auths":{"${CI_REGISTRY}":{"auth":"$(printf '%s:%s' "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 -w0)"}}}
      EOF
    - |
      # Always push the per-arch tag :${SHA}-${ARCH} (and :${TAG}-${ARCH}
      # on tag pipelines). The amd64 build ALSO pushes the canonical
      # :${SHA} (no suffix) and :latest (main only) — these are the
      # backward-compatible tags that pre-v0.4 jobs (smoke, downstream
      # consumers) expect. On tag pipelines, build:image:manifest
      # OVERWRITES :${SHA} + :${TAG} with the multi-arch index so the
      # canonical tag always resolves correctly :
      #   * dev / MR / main → :${SHA} = amd64-only manifest
      #   * tag             → :${SHA} = multi-arch index
      DESTS="--destination=${CI_REGISTRY_IMAGE}/${IMAGE_NAME}:${CI_COMMIT_SHA}-${ARCH}"
      [ -n "${CI_COMMIT_TAG}" ] && DESTS="$DESTS --destination=${CI_REGISTRY_IMAGE}/${IMAGE_NAME}:${CI_COMMIT_TAG}-${ARCH}"
      if [ "${ARCH}" = "amd64" ]; then
        DESTS="$DESTS --destination=${CI_REGISTRY_IMAGE}/${IMAGE_NAME}:${CI_COMMIT_SHA}"
        [ -n "${CI_COMMIT_TAG}" ] && DESTS="$DESTS --destination=${CI_REGISTRY_IMAGE}/${IMAGE_NAME}:${CI_COMMIT_TAG}"
        [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ] \
          && DESTS="$DESTS --destination=${CI_REGISTRY_IMAGE}/${IMAGE_NAME}:latest"
      fi
    - >
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/${DOCKERFILE}"
      --customPlatform=linux/${ARCH}
      ${DESTS}
      --cache=true
      --cache-ttl=24h
      --cache-repo="${CI_REGISTRY_IMAGE}/${IMAGE_NAME}-cache"

# ---------------------------------------------------------------------------
# amd64 builds — run on every dev / MR / main / tag pipeline.
# ---------------------------------------------------------------------------

build:image:
  extends: .kaniko-build-base
  variables:
    IMAGE_NAME: "claude-code"
    DOCKERFILE: "Dockerfile.claude-code"
    ARCH: "amd64"
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

build:image:dns-filter:
  extends: .kaniko-build-base
  variables:
    IMAGE_NAME: "dns-filter"
    DOCKERFILE: "Dockerfile.dns-filter"
    ARCH: "amd64"
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

build:image:egress-proxy:
  extends: .kaniko-build-base
  variables:
    IMAGE_NAME: "egress-proxy"
    DOCKERFILE: "Dockerfile.egress-proxy"
    ARCH: "amd64"
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Broker (ADR-0033) — CI-only image (production runs the broker host-side
# per ADR-0006). Built so smoke:full-stack can pull from registry instead
# of building the broker locally on every CI run. The Dockerfile.broker
# build needs `SECURED_CLAUDE_VERSION` as a build-arg (hatch-vcs can't
# read git history inside the container) ; we pass it via --build-arg.
# Doesn't extend .kaniko-build-base because it needs the extra --build-arg.
build:image:broker:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - mkdir -p /kaniko/.docker
    - |
      cat > /kaniko/.docker/config.json <<EOF
      {"auths":{"${CI_REGISTRY}":{"auth":"$(printf '%s:%s' "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 -w0)"}}}
      EOF
    - |
      # Same destination scheme as the other images : per-arch + canonical
      # tags (canonical is amd64-only on dev/main ; manifest combiner
      # overwrites it on tag pipelines per ADR-0028).
      DESTS="--destination=${CI_REGISTRY_IMAGE}/broker:${CI_COMMIT_SHA}-amd64"
      [ -n "${CI_COMMIT_TAG}" ] && DESTS="$DESTS --destination=${CI_REGISTRY_IMAGE}/broker:${CI_COMMIT_TAG}-amd64"
      DESTS="$DESTS --destination=${CI_REGISTRY_IMAGE}/broker:${CI_COMMIT_SHA}"
      [ -n "${CI_COMMIT_TAG}" ] && DESTS="$DESTS --destination=${CI_REGISTRY_IMAGE}/broker:${CI_COMMIT_TAG}"
      [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ] \
        && DESTS="$DESTS --destination=${CI_REGISTRY_IMAGE}/broker:latest"
      # Build-arg : hatch-vcs needs git tags to derive the version, but
      # the .git dir isn't in the container context. We synthesise a
      # PEP 440 compliant version :
      #   * tag pipeline : strip the "v" prefix from CI_COMMIT_TAG (e.g.
      #                    "v0.5.1" → "0.5.1")
      #   * dev / MR / main : "0.0.0+<short-sha>" — the local-version
      #                       segment satisfies PEP 440 + tags the SHA
      if [ -n "${CI_COMMIT_TAG}" ]; then
        VERSION="${CI_COMMIT_TAG#v}"
      else
        VERSION="0.0.0+${CI_COMMIT_SHORT_SHA}"
      fi
    - >
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile.broker"
      --customPlatform=linux/amd64
      --build-arg "SECURED_CLAUDE_VERSION=${VERSION}"
      ${DESTS}
      --cache=true
      --cache-ttl=24h
      --cache-repo="${CI_REGISTRY_IMAGE}/broker-cache"

build:image:broker:arm64:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - mkdir -p /kaniko/.docker
    - |
      cat > /kaniko/.docker/config.json <<EOF
      {"auths":{"${CI_REGISTRY}":{"auth":"$(printf '%s:%s' "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 -w0)"}}}
      EOF
    - |
      DESTS="--destination=${CI_REGISTRY_IMAGE}/broker:${CI_COMMIT_SHA}-arm64"
      DESTS="$DESTS --destination=${CI_REGISTRY_IMAGE}/broker:${CI_COMMIT_TAG}-arm64"
      VERSION="${CI_COMMIT_TAG#v}"
    - >
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile.broker"
      --customPlatform=linux/arm64
      --build-arg "SECURED_CLAUDE_VERSION=${VERSION}"
      ${DESTS}
      --cache=true
      --cache-ttl=24h
      --cache-repo="${CI_REGISTRY_IMAGE}/broker-cache"

# Cerbos (ADR-0036) — wraps cerbos/cerbos:0.42.0 with policies + config
# baked in. Same DinD-bind-mount fix as ADR-0035 for the sidecars.
build:image:cerbos:
  extends: .kaniko-build-base
  variables:
    IMAGE_NAME: "cerbos"
    DOCKERFILE: "Dockerfile.cerbos"
    ARCH: "amd64"
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

build:image:cerbos:arm64:
  extends: .kaniko-build-base
  variables:
    IMAGE_NAME: "cerbos"
    DOCKERFILE: "Dockerfile.cerbos"
    ARCH: "arm64"
  rules:
    - if: $CI_COMMIT_TAG

# ---------------------------------------------------------------------------
# arm64 builds — tag-only (cheap iteration loops stay amd64-only).
# Native on the macbook-local runner ; no QEMU emulation needed.
# ---------------------------------------------------------------------------

build:image:arm64:
  extends: .kaniko-build-base
  variables:
    IMAGE_NAME: "claude-code"
    DOCKERFILE: "Dockerfile.claude-code"
    ARCH: "arm64"
  rules:
    - if: $CI_COMMIT_TAG

build:image:dns-filter:arm64:
  extends: .kaniko-build-base
  variables:
    IMAGE_NAME: "dns-filter"
    DOCKERFILE: "Dockerfile.dns-filter"
    ARCH: "arm64"
  rules:
    - if: $CI_COMMIT_TAG

build:image:egress-proxy:arm64:
  extends: .kaniko-build-base
  variables:
    IMAGE_NAME: "egress-proxy"
    DOCKERFILE: "Dockerfile.egress-proxy"
    ARCH: "arm64"
  rules:
    - if: $CI_COMMIT_TAG

# ---------------------------------------------------------------------------
# Manifest combiner — `crane index append` makes the canonical :${TAG}
# point at a manifest-list that references both per-arch manifests.
# Cosign signs :${TAG} (the index) ; the signature covers both arches.
# Tag-only ; per-SHA / latest tags stay amd64-only by design (the dev
# loop doesn't need arm64 — that's a QEMU cost we'd pay every commit
# for no enterprise benefit).
# ---------------------------------------------------------------------------

build:image:manifest:
  stage: build
  image: alpine:3.20@sha256:d9e853e87e55526f6b2917df91a2115c36dd7c696a35be12163d44e6e2a4b6bc
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - build:image
    - build:image:arm64
    - build:image:dns-filter
    - build:image:dns-filter:arm64
    - build:image:egress-proxy
    - build:image:egress-proxy:arm64
    - build:image:broker
    - build:image:broker:arm64
    - build:image:cerbos
    - build:image:cerbos:arm64
  variables:
    CRANE_VERSION: "0.20.5"
  script:
    - apk add --no-cache curl
    - |
      a=$(uname -m)
      case "$a" in
        x86_64)  arch_tag="x86_64" ;;
        aarch64|arm64) arch_tag="arm64" ;;
        *) echo "unsupported arch: $a"; exit 2 ;;
      esac
      curl -fsSL "https://github.com/google/go-containerregistry/releases/download/v${CRANE_VERSION}/go-containerregistry_Linux_${arch_tag}.tar.gz" \
        | tar -xz -C /usr/local/bin crane
      crane version
    - crane auth login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
    - |
      # For each image, combine the amd64 + arm64 manifests into a
      # manifest-list under :${TAG} (and :${SHA} for traceability).
      for img in claude-code dns-filter egress-proxy broker cerbos; do
        echo "===== $img : amd64 + arm64 → manifest list ====="
        crane index append \
          -m "${CI_REGISTRY_IMAGE}/${img}:${CI_COMMIT_TAG}-amd64" \
          -m "${CI_REGISTRY_IMAGE}/${img}:${CI_COMMIT_TAG}-arm64" \
          -t "${CI_REGISTRY_IMAGE}/${img}:${CI_COMMIT_TAG}"
        # Also tag the multi-arch manifest at :${SHA} for cosign-sign
        # jobs and runtime smoke (which look up by SHA).
        crane index append \
          -m "${CI_REGISTRY_IMAGE}/${img}:${CI_COMMIT_SHA}-amd64" \
          -m "${CI_REGISTRY_IMAGE}/${img}:${CI_COMMIT_SHA}-arm64" \
          -t "${CI_REGISTRY_IMAGE}/${img}:${CI_COMMIT_SHA}"
      done
    - echo "✓ multi-arch manifest list pushed for all 3 images"
