---
# Build stage — Python wheel + sdist, multi-arch container image.

build:python:
  stage: build
  image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
  cache:
    - key:
        files: [uv.lock]
      paths: [.venv/, .uv-cache/]
      policy: pull-push
  before_script:
    - uv sync --all-extras --frozen
  script:
    - uv build
    - ls -la dist/
  artifacts:
    paths: [dist/]
    expire_in: 90 days

build:image:
  # Single-arch (arm64 on macbook-local) for v0.1.x. Multi-arch via buildx
  # requires either Docker-in-Docker (privileged) or a remote builder ;
  # the runner-mounted /var/run/docker.sock didn't carry buildx-create
  # capability through. Tracked for v0.2 with Kaniko or proper buildx DinD.
  stage: build
  image: docker:27
  variables:
    DOCKER_HOST: "unix:///var/run/docker.sock"
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - |
      TAGS="-t ${CI_REGISTRY_IMAGE}/claude-code:${CI_COMMIT_SHA}"
      if [ -n "${CI_COMMIT_TAG}" ]; then
        TAGS="$TAGS -t ${CI_REGISTRY_IMAGE}/claude-code:${CI_COMMIT_TAG}"
      fi
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        TAGS="$TAGS -t ${CI_REGISTRY_IMAGE}/claude-code:latest"
      fi
    - docker build ${TAGS} -f Dockerfile.claude-code .
    - |
      for tag_arg in $(echo "$TAGS" | tr ' ' '\n' | grep -v '^-t$' | grep -v '^$'); do
        docker push "$tag_arg"
      done
