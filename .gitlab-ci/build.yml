---
# Build stage — Python wheel + sdist, multi-arch container image.

build:python:
  stage: build
  image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
  cache:
    - key:
        files: [uv.lock]
      paths: [.venv/, .uv-cache/]
      policy: pull-push
  before_script:
    # hatch-vcs reads the package version from the latest git tag (ADR-0018).
    # The bookworm-slim image doesn't bundle git ; install it so `uv build`
    # can resolve the version. The Kaniko build:image job uses a different
    # base and doesn't need this.
    - apt-get update -qq && apt-get install -y --no-install-recommends git
    # GitLab clones with depth=20 by default — ensure the tag is reachable.
    - git fetch --tags --depth=100 || true
    - uv sync --all-extras --frozen
  script:
    - uv build
    - ls -la dist/
  artifacts:
    paths: [dist/]
    expire_in: 90 days

build:image:
  # Daemonless image build via Kaniko : the macbook-local runner's mounted
  # /var/run/docker.sock works for `docker login` but `docker build` /
  # `buildx` consistently fail to dial the daemon (vpnkit proxy quirk on
  # Mac Docker Desktop). Kaniko builds the image without a Docker daemon
  # and pushes to the registry directly.
  #
  # `--customPlatform=linux/amd64` pins the resulting image to amd64
  # regardless of the runner's native arch (the macbook-local runner is
  # arm64 — Apple Silicon — so without this flag v0.1.8 shipped as
  # architecture=arm64 only, which broke amd64 users with `exec format
  # error` unless they ran QEMU). amd64 is the larger enterprise base.
  # arm64 users (Apple Silicon, AWS Graviton) currently fall back to
  # QEMU emulation under Docker Desktop / containerd binfmt_misc.
  # True multi-arch (manifest list with both linux/amd64 + linux/arm64)
  # is tracked for v0.3 — needs two Kaniko jobs + crane index append
  # to combine, see the v0.2 README "configured but NOT yet enforced"
  # table.
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - mkdir -p /kaniko/.docker
    - |
      cat > /kaniko/.docker/config.json <<EOF
      {"auths":{"${CI_REGISTRY}":{"auth":"$(printf '%s:%s' "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 -w0)"}}}
      EOF
    - |
      DESTS="--destination=${CI_REGISTRY_IMAGE}/claude-code:${CI_COMMIT_SHA}"
      [ -n "${CI_COMMIT_TAG}" ] && DESTS="$DESTS --destination=${CI_REGISTRY_IMAGE}/claude-code:${CI_COMMIT_TAG}"
      [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ] && DESTS="$DESTS --destination=${CI_REGISTRY_IMAGE}/claude-code:latest"
    - >
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile.claude-code"
      --customPlatform=linux/amd64
      ${DESTS}
      --cache=true
      --cache-ttl=24h
      --cache-repo="${CI_REGISTRY_IMAGE}/claude-code-cache"

# ---------------------------------------------------------------------------
# Sidecar images (ADR-0025) — pre-built so the runtime container can be
# read_only:true. The Dockerfiles are tiny (FROM alpine + apk add + ENTRYPOINT)
# so build time is < 30 s each. Same Kaniko + linux/amd64 + caching pattern
# as build:image (the agent).
# ---------------------------------------------------------------------------

