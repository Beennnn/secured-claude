---
# Test stage — pytest matrix on supported Python versions, coverage gate ≥ 90%.

# ---------------------------------------------------------------------------
# Unit tests on Python 3.13 (current default)
# ---------------------------------------------------------------------------

test:py313:
  stage: test
  extends: .cache-uv-incremental
  script:
    - uv sync --all-extras --python 3.13
    - uv run pytest tests/ --cov=src/secured_claude --cov-report=xml --cov-report=term -m "not audit"
  coverage: '/^TOTAL.+?(\d+\.?\d*\%)/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
    expire_in: 30 days

# ---------------------------------------------------------------------------
# Compat matrix — Python 3.11 + 3.12 to verify supported floor versions
# ---------------------------------------------------------------------------

test:py311:
  stage: test
  extends: .cache-uv-incremental
  script:
    - uv sync --all-extras --python 3.11
    - uv run pytest tests/ -m "not audit" -q
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

test:py312:
  stage: test
  extends: .cache-uv-incremental
  script:
    - uv sync --all-extras --python 3.12
    - uv run pytest tests/ -m "not audit" -q
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
