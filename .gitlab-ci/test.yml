---
# Test stage — pytest matrix on supported Python versions, coverage gate ≥ 90%.

# Reusable Python+uv setup. Each test job overrides the image tag.
.uv-test:
  stage: test
  cache:
    - key:
        files: [uv.lock]
      paths: [.venv/, .uv-cache/]
      policy: pull-push
    - key: incremental-${CI_COMMIT_REF_SLUG}
      paths: [.pytest_cache/, .mypy_cache/, .ruff_cache/]
      policy: pull-push
  before_script:
    # hatch-vcs (ADR-0018) needs git in the slim base.
    - apt-get update -qq && apt-get install -y --no-install-recommends git
    - git fetch --tags --depth=100 || true
    - uv sync --all-extras --frozen

# ---------------------------------------------------------------------------
# Default Python (3.13) — runs on every pipeline
# ---------------------------------------------------------------------------

test:py313:
  extends: .uv-test
  image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
  script:
    - uv run pytest tests/ --cov=src/secured_claude --cov-report=xml --cov-report=term -m "not audit"
  coverage: '/^TOTAL.+?(\d+\.?\d*\%)/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths: [coverage.xml]
    # 1-year retention so the GitLab Release asset link (ADR-0023) stays valid.
    expire_in: 1 year

# ---------------------------------------------------------------------------
# Compat matrix — Python 3.11 + 3.12 — only on MR / main / tags
# ---------------------------------------------------------------------------

test:py311:
  extends: .uv-test
  image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
  script:
    - uv run pytest tests/ -m "not audit" -q
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

test:py312:
  extends: .uv-test
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  script:
    - uv run pytest tests/ -m "not audit" -q
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# NOTE : the runtime-smoke job moved to .gitlab-ci/smoke.yml (ADR-0026).
# It needs to run AFTER build:image:* which is in the build stage, so it
# can't sit in the test stage (test runs before build per the global
# stages order in .gitlab-ci.yml). Lives in its own `smoke` stage between
# build and publish.
