---
# Test stage — pytest matrix on supported Python versions, coverage gate ≥ 90%.

# Reusable Python+uv setup. Each test job overrides the image tag.
.uv-test:
  stage: test
  cache:
    - key:
        files: [uv.lock]
      paths: [.venv/, .uv-cache/]
      policy: pull-push
    - key: incremental-${CI_COMMIT_REF_SLUG}
      paths: [.pytest_cache/, .mypy_cache/, .ruff_cache/]
      policy: pull-push
  before_script:
    # hatch-vcs (ADR-0018) needs git in the slim base.
    - apt-get update -qq && apt-get install -y --no-install-recommends git
    - git fetch --tags --depth=100 || true
    - uv sync --all-extras --frozen

# ---------------------------------------------------------------------------
# Default Python (3.13) — runs on every pipeline
# ---------------------------------------------------------------------------

test:py313:
  extends: .uv-test
  image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
  script:
    - uv run pytest tests/ --cov=src/secured_claude --cov-report=xml --cov-report=term -m "not audit"
  coverage: '/^TOTAL.+?(\d+\.?\d*\%)/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths: [coverage.xml]
    # 1-year retention so the GitLab Release asset link (ADR-0023) stays valid.
    expire_in: 1 year

# ---------------------------------------------------------------------------
# Compat matrix — Python 3.11 + 3.12 — only on MR / main / tags
# ---------------------------------------------------------------------------

test:py311:
  extends: .uv-test
  image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
  script:
    - uv run pytest tests/ -m "not audit" -q
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

test:py312:
  extends: .uv-test
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  script:
    - uv run pytest tests/ -m "not audit" -q
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# ---------------------------------------------------------------------------
# Runtime smoke (ADR-0026) — proves the wiring of the just-built images
# without burning Anthropic API budget. The 117 unit tests + 26 audit-demo
# scenarios + 4 bin/test-egress.sh assertions all pass at the *L1 + sidecar*
# layer, but they don't prove the *agent image itself* boots correctly.
# This job pulls the freshly-built images and verifies :
#   * agent image has the `claude` binary on PATH
#   * agent image has the `secured-claude-hook` script with the right shebang
#     (the v0.1.1 lesson : hook.py without #!/usr/bin/env python3 made bash
#     parse Python as shell)
#   * dns-filter image runs dnsmasq --version cleanly
#   * egress-proxy image runs tinyproxy -v cleanly
# ---------------------------------------------------------------------------

test:runtime-smoke:
  stage: test
  image: docker:24-cli
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  needs:
    - build:image
    - build:image:dns-filter
    - build:image:egress-proxy
  variables:
    DOCKER_HOST: "unix:///var/run/docker.sock"
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    # Pull all 3 images by SHA — same bytes the build:image:* jobs pushed.
    - docker pull "$CI_REGISTRY_IMAGE/claude-code:$CI_COMMIT_SHA"
    - docker pull "$CI_REGISTRY_IMAGE/dns-filter:$CI_COMMIT_SHA"
    - docker pull "$CI_REGISTRY_IMAGE/egress-proxy:$CI_COMMIT_SHA"
    # Agent image — verify the 3 things v0.1.1's runtime smoke would have caught :
    # 1. claude binary on PATH
    # 2. secured-claude-hook script exists + has #!/usr/bin/env python3 shebang
    # 3. settings.template.json present (entrypoint copies it to ~/.claude/settings.json)
    - >
      docker run --rm --entrypoint sh "$CI_REGISTRY_IMAGE/claude-code:$CI_COMMIT_SHA"
      -c 'which claude && claude --version'
    - >
      docker run --rm --entrypoint sh "$CI_REGISTRY_IMAGE/claude-code:$CI_COMMIT_SHA"
      -c 'test -x /usr/local/bin/secured-claude-hook'
    - >
      docker run --rm --entrypoint sh "$CI_REGISTRY_IMAGE/claude-code:$CI_COMMIT_SHA"
      -c 'head -1 /usr/local/bin/secured-claude-hook | grep -q "^#!/usr/bin/env python3"'
    - >
      docker run --rm --entrypoint sh "$CI_REGISTRY_IMAGE/claude-code:$CI_COMMIT_SHA"
      -c 'test -f /etc/secured-claude/settings.template.json'
    # Sidecar images — verify the binaries run cleanly + report version.
    - >
      docker run --rm --entrypoint /usr/sbin/dnsmasq "$CI_REGISTRY_IMAGE/dns-filter:$CI_COMMIT_SHA"
      --version
    - >
      docker run --rm --entrypoint sh "$CI_REGISTRY_IMAGE/egress-proxy:$CI_COMMIT_SHA"
      -c 'tinyproxy -v 2>&1 | head -1'
    - echo "✓ runtime smoke — all 3 images boot cleanly, hook wired correctly"
