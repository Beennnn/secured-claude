---
# Lint stage — fast, parallel feedback on style / types / shell / docker / policy.
# Each job uses an image dedicated to its tool, avoiding per-job tool installs.

# ---------------------------------------------------------------------------
# Python lint — ruff (security S rules + style + import-order + format)
# ---------------------------------------------------------------------------

lint:ruff:
  stage: lint
  image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
  cache:
    - key:
        files: [uv.lock]
      paths: [.venv/, .uv-cache/]
      policy: pull-push
    - key: incremental-${CI_COMMIT_REF_SLUG}
      paths: [.ruff_cache/]
      policy: pull-push
  before_script:
    - uv sync --all-extras --frozen
  script:
    - uv run ruff check src/ tests/
    - uv run ruff format --check src/ tests/

# ---------------------------------------------------------------------------
# Python types — mypy --strict
# ---------------------------------------------------------------------------

lint:mypy:
  stage: lint
  image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
  cache:
    - key:
        files: [uv.lock]
      paths: [.venv/, .uv-cache/]
      policy: pull-push
    - key: incremental-${CI_COMMIT_REF_SLUG}
      paths: [.mypy_cache/]
      policy: pull-push
  before_script:
    - uv sync --all-extras --frozen
  script:
    - uv run mypy src/

# ---------------------------------------------------------------------------
# Dockerfile lint — hadolint
# ---------------------------------------------------------------------------

lint:hadolint:
  stage: lint
  image:
    name: hadolint/hadolint:latest-debian
    entrypoint: [""]
  script:
    - hadolint Dockerfile.claude-code

# ---------------------------------------------------------------------------
# Shell lint — shellcheck
# ---------------------------------------------------------------------------

lint:shellcheck:
  stage: lint
  image:
    name: koalaman/shellcheck-alpine:stable
    entrypoint: [""]
  script:
    - shellcheck docker/entrypoint.sh
    - shellcheck bin/*.sh
    - shellcheck install.sh

# ---------------------------------------------------------------------------
# Cerbos policy compile — confirms the L1 of defense-in-depth is well-formed
# ---------------------------------------------------------------------------

lint:cerbos-compile:
  # The official cerbos/cerbos:0.42.0 image is distroless (no shell), and
  # the runner-mounted docker.sock has perm issues on Mac Docker Desktop.
  # Cleanest path : pull the static `cerbos` binary in an alpine job and
  # run `cerbos compile` directly.
  stage: lint
  image: alpine:latest
  variables:
    CERBOS_VERSION: "0.42.0"
  script:
    - apk add --no-cache curl tar
    - |
      a=$(uname -m)
      case "$a" in
        x86_64)  arch_tag="Linux_x86_64" ;;
        aarch64|arm64) arch_tag="Linux_arm64" ;;
        *) echo "unsupported arch: $a" ; exit 2 ;;
      esac
      curl -fsSL "https://github.com/cerbos/cerbos/releases/download/v${CERBOS_VERSION}/cerbos_${CERBOS_VERSION}_${arch_tag}.tar.gz" \
        | tar -xz cerbos
    - ./cerbos compile policies/

# ---------------------------------------------------------------------------
# Conventional Commits — verify all commits follow CC 1.0
# ---------------------------------------------------------------------------

lint:commits:
  stage: lint
  image:
    name: alpine/git:latest
    entrypoint: [""]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"
  script:
    - apk add --no-cache bash >/dev/null
    - |
      if [ "$CI_PIPELINE_SOURCE" = "merge_request_event" ]; then
        BASE="${CI_MERGE_REQUEST_DIFF_BASE_SHA:-origin/main}"
      else
        BASE="origin/main"
      fi
    - git fetch origin main:refs/remotes/origin/main
    - |
      bash -c '
      regex="^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-zA-Z0-9._/-]+\))?!?: .{1,72}$"
      bad=0
      for sha in $(git rev-list "${BASE}..HEAD"); do
        msg=$(git log -1 --pretty=%s "$sha")
        if ! [[ "$msg" =~ $regex ]]; then
          echo "✗ $sha — $msg"
          bad=$((bad+1))
        fi
      done
      if [ "$bad" -gt 0 ]; then
        echo "$bad commit(s) violate Conventional Commits 1.0"
        exit 1
      fi
      echo "✓ All commits follow Conventional Commits 1.0"
      '
