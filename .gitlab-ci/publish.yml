---
# Publish stage — only on tags. Wheel → GitLab Package Registry,
# image already pushed by build:image, cosign keyless signs it.

publish:pypi:
  stage: publish
  image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
  rules:
    - if: $CI_COMMIT_TAG
  needs: [build:python]
  cache:
    - key:
        files: [uv.lock]
      paths: [.venv/, .uv-cache/]
      policy: pull-push
  before_script:
    - uv sync --all-extras --frozen
  script:
    - uv run python -m pip install --quiet twine
    # GitLab Package Registry rejects `twine upload --skip-existing` with
    # UnsupportedConfiguration. Until pyproject.toml gets a dynamic version
    # (hatch-vcs in v0.2 — read from git tag), each v0.1.x tag tries to
    # re-upload the same `secured_claude-0.1.0-...whl` filename, which
    # GitLab refuses with 400 Bad Request. We treat that specific error
    # as success so the publish stage stays idempotent across re-tags.
    # Any other twine failure still fails the job.
    - |
      set +e
      uv run twine upload \
        --repository-url "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi" \
        -u gitlab-ci-token -p "${CI_JOB_TOKEN}" \
        dist/* 2>&1 | tee /tmp/twine.log
      rc=${PIPESTATUS[0]}
      set -e
      if [ "$rc" -eq 0 ]; then
        echo "✓ wheel uploaded"
        exit 0
      fi
      if grep -qiE "400 Bad Request|already exists|file with that name" /tmp/twine.log; then
        echo "✓ wheel already published (idempotent re-tag) — treating as success"
        exit 0
      fi
      echo "✗ twine failed with unrecoverable error (rc=$rc)" >&2
      exit "$rc"

publish:cosign-sign:
  # gcr.io/projectsigstore/cosign image is distroless (no sh), so GitLab CI
  # can't wrap the script. Same workaround as lint:cerbos-compile : alpine
  # + the static `cosign` binary from the official GitHub release.
  stage: publish
  image: alpine:latest
  variables:
    COSIGN_VERSION: "2.4.1"
    COSIGN_EXPERIMENTAL: "1"
  rules:
    - if: $CI_COMMIT_TAG
  needs: [build:image]
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  script:
    - apk add --no-cache curl
    - |
      a=$(uname -m)
      case "$a" in
        x86_64)  arch="amd64" ;;
        aarch64|arm64) arch="arm64" ;;
        *) echo "unsupported arch: $a"; exit 2 ;;
      esac
      curl -fsSL "https://github.com/sigstore/cosign/releases/download/v${COSIGN_VERSION}/cosign-linux-${arch}" \
        -o /usr/local/bin/cosign
      chmod 0755 /usr/local/bin/cosign
    - cosign version
    # cosign reuses docker's auth config to push the signature blob to the
    # registry. Without it the sigstore tlog entry is created but the push
    # to the GitLab Container Registry fails with HTTP 401 UNAUTHORIZED.
    - |
      mkdir -p "$HOME/.docker"
      cat > "$HOME/.docker/config.json" <<EOF
      {"auths":{"${CI_REGISTRY}":{"auth":"$(printf '%s:%s' "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 -w0)"}}}
      EOF
    - cosign sign --yes "${CI_REGISTRY_IMAGE}/claude-code:${CI_COMMIT_TAG}"
    - >
      cosign verify
      "${CI_REGISTRY_IMAGE}/claude-code:${CI_COMMIT_TAG}"
      --certificate-identity-regexp "^https://gitlab.com/benoit.besson/secured-claude"
      --certificate-oidc-issuer https://gitlab.com
