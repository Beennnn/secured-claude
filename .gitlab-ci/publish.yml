---
# Publish stage — only on tags. Wheel → GitLab Package Registry,
# image already pushed by build:image, cosign keyless signs it.

publish:pypi:
  stage: publish
  image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
  rules:
    - if: $CI_COMMIT_TAG
  needs: [build:python]
  cache:
    - key:
        files: [uv.lock]
      paths: [.venv/, .uv-cache/]
      policy: pull-push
  before_script:
    # hatch-vcs (ADR-0018) needs git in the slim base.
    - apt-get update -qq && apt-get install -y --no-install-recommends git
    - git fetch --tags --depth=100 || true
    - uv sync --all-extras --frozen
  script:
    - uv run python -m pip install --quiet twine
    # hatch-vcs (ADR-0018) makes each tag produce a unique wheel filename
    # (secured_claude-X.Y.Z-py3-none-any.whl). Plain twine upload is
    # idempotent for FRESH tags ; --skip-existing lets us re-run the
    # publish stage on a re-tag (e.g. when a tag pipeline failed mid-way
    # on a CI infrastructure issue and we re-tagged after fixing it).
    # GitLab Package Registry returns 400 Bad Request on duplicate
    # uploads ; --skip-existing translates that into a no-op + zero exit.
    - >
      uv run twine upload --skip-existing
      --repository-url "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi"
      -u gitlab-ci-token -p "${CI_JOB_TOKEN}"
      dist/*

# ---------------------------------------------------------------------------
# Cosign keyless OIDC signing — ADR-0016 + ADR-0025 (sidecars in v0.3.1).
#
# gcr.io/projectsigstore/cosign image is distroless (no sh), so GitLab CI
# can't wrap the script. Same workaround as lint:cerbos-compile : alpine
# + the static `cosign` binary from the official GitHub release.
#
# Hidden template factor : 3 concrete jobs (agent + 2 sidecars) extend
# `.cosign-sign-base` with the IMAGE_NAME variable. Same OIDC token,
# same registry auth, same cosign install — only the destination tag
# differs.
# ---------------------------------------------------------------------------

.cosign-sign-base:
  stage: publish
  image: alpine:latest
  variables:
    COSIGN_VERSION: "2.4.1"
    COSIGN_EXPERIMENTAL: "1"
  rules:
    - if: $CI_COMMIT_TAG
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  before_script:
    - apk add --no-cache curl
    - |
      a=$(uname -m)
      case "$a" in
        x86_64)  arch="amd64" ;;
        aarch64|arm64) arch="arm64" ;;
        *) echo "unsupported arch: $a"; exit 2 ;;
      esac
      curl -fsSL "https://github.com/sigstore/cosign/releases/download/v${COSIGN_VERSION}/cosign-linux-${arch}" \
        -o /usr/local/bin/cosign
      chmod 0755 /usr/local/bin/cosign
    - cosign version
    # cosign reuses docker's auth config to push the signature blob to the
    # registry. Without it the sigstore tlog entry is created but the push
    # to the GitLab Container Registry fails with HTTP 401 UNAUTHORIZED.
    - |
      mkdir -p "$HOME/.docker"
      cat > "$HOME/.docker/config.json" <<EOF
      {"auths":{"${CI_REGISTRY}":{"auth":"$(printf '%s:%s' "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 -w0)"}}}
      EOF

publish:cosign-sign:
  extends: .cosign-sign-base
  needs: [build:image:manifest]
  script:
    # Sign the manifest list (the v0.4 multi-arch index) ; the signature
    # covers both linux/amd64 + linux/arm64 manifests it references.
    - cosign sign --yes "${CI_REGISTRY_IMAGE}/claude-code:${CI_COMMIT_TAG}"
    - >
      cosign verify
      "${CI_REGISTRY_IMAGE}/claude-code:${CI_COMMIT_TAG}"
      --certificate-identity-regexp "^https://gitlab.com/benoit.besson/secured-claude"
      --certificate-oidc-issuer https://gitlab.com

