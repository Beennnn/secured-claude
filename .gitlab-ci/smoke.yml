---
# Smoke stage — runtime-smoke (ADR-0026).
#
# Proves the wiring of the just-built images without burning Anthropic API
# budget. The 123 unit tests + 26 audit-demo scenarios + 4 bin/test-egress.sh
# assertions all pass at the L1 + sidecar layer, but they don't prove the
# agent image itself boots correctly.
#
# This job pulls the freshly-built images by SHA and verifies :
#   * agent image has the `claude` binary on PATH
#   * agent image has the `secured-claude-hook` script with the right shebang
#     (the v0.1.1 lesson : hook.py without #!/usr/bin/env python3 made bash
#     parse Python as shell — invisible to all static gates)
#   * agent image has settings.template.json (entrypoint copies it)
#   * dns-filter image runs dnsmasq --version cleanly
#   * egress-proxy image runs tinyproxy -v cleanly
#
# No LLM call, no API key, no cost. Real-LLM smoke = v0.4 manual-trigger.

smoke:runtime:
  stage: smoke
  image: docker:24-cli
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  needs:
    - build:image
    - build:image:dns-filter
    - build:image:egress-proxy
    # On tag pipelines, the manifest combiner overwrites :${SHA} with the
    # multi-arch index ; smoke must wait for it. On main pipelines, the
    # combiner doesn't run (rules: tag-only) so this need is no-op.
    - job: build:image:manifest
      optional: true
  variables:
    DOCKER_HOST: "unix:///var/run/docker.sock"
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    # Pull all 3 images by SHA — same bytes the build:image:* jobs pushed.
    - docker pull "$CI_REGISTRY_IMAGE/claude-code:$CI_COMMIT_SHA"
    - docker pull "$CI_REGISTRY_IMAGE/dns-filter:$CI_COMMIT_SHA"
    - docker pull "$CI_REGISTRY_IMAGE/egress-proxy:$CI_COMMIT_SHA"
    # Agent image — verify the 3 things v0.1.1's runtime smoke would have caught :
    # 1. claude binary on PATH
    # 2. secured-claude-hook script exists + has #!/usr/bin/env python3 shebang
    # 3. settings.template.json present (entrypoint copies it to ~/.claude/settings.json)
    - >
      docker run --rm --entrypoint sh "$CI_REGISTRY_IMAGE/claude-code:$CI_COMMIT_SHA"
      -c 'which claude && claude --version'
    - >
      docker run --rm --entrypoint sh "$CI_REGISTRY_IMAGE/claude-code:$CI_COMMIT_SHA"
      -c 'test -x /usr/local/bin/secured-claude-hook'
    - >
      docker run --rm --entrypoint sh "$CI_REGISTRY_IMAGE/claude-code:$CI_COMMIT_SHA"
      -c 'head -1 /usr/local/bin/secured-claude-hook | grep -q "^#!/usr/bin/env python3"'
    - >
      docker run --rm --entrypoint sh "$CI_REGISTRY_IMAGE/claude-code:$CI_COMMIT_SHA"
      -c 'test -f /etc/secured-claude/settings.template.json'
    # Sidecar images — verify the binaries run cleanly + report version.
    - >
      docker run --rm --entrypoint /usr/sbin/dnsmasq "$CI_REGISTRY_IMAGE/dns-filter:$CI_COMMIT_SHA"
      --version
    - >
      docker run --rm --entrypoint sh "$CI_REGISTRY_IMAGE/egress-proxy:$CI_COMMIT_SHA"
      -c 'tinyproxy -v 2>&1 | head -1'
    - echo "✓ runtime smoke — all 3 images boot cleanly, hook wired correctly"

# ---------------------------------------------------------------------------
# Full-stack smoke (ADR-0033) — boots the 5-container stack via
# docker-compose.yml + docker-compose.ci.yml + runs bin/test-full-stack.sh.
# Proves the agent → hook → broker → Cerbos → audit log path end-to-end.
# Tag-only because the broker image is registry-pushed only on tag pipelines
# (the manifest combiner runs on tag, the per-SHA tag is amd64-only on
# main/dev). v0.6 ticket : extend smoke to dev pipelines once the broker
# is available at :${SHA} on every push.
# ---------------------------------------------------------------------------

smoke:full-stack:
  stage: smoke
  image: docker:24-cli
  rules:
    # v0.5.4 dropped allow_failure : configs are now baked into the sidecar
    # images (ADR-0035), so docker compose up no longer needs the
    # /builds/... bind-mounts that broke under Docker-in-Docker. The job
    # gates the release pipeline as designed.
    - if: $CI_COMMIT_TAG
  needs:
    - build:image
    - build:image:dns-filter
    - build:image:egress-proxy
    - build:image:broker
    - build:image:manifest
  variables:
    DOCKER_HOST: "unix:///var/run/docker.sock"
  before_script:
    # bin/test-full-stack.sh requires bash + git + docker-compose-cli.
    # docker:24-cli alpine has docker but not bash or git ; install them.
    - apk add --no-cache bash git docker-cli-compose
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    # docker-compose.ci.yml uses ${CI_REGISTRY_IMAGE}/broker:${CI_COMMIT_SHA}
    # for the broker `image:`, so compose `up` pulls from the registry
    # instead of rebuilding. Set the env so the variable substitution
    # resolves at compose-eval time.
    - export CI_REGISTRY_IMAGE
    - export CI_COMMIT_SHA
    - bash bin/test-full-stack.sh
  artifacts:
    when: on_failure
    paths:
      # Container logs on failure for debugging.
      - /tmp/full-stack-logs.txt
    expire_in: 7 days

# ---------------------------------------------------------------------------
# Real-LLM smoke (ADR-0030) — MANUAL-TRIGGER ONLY.
#
# Burns Anthropic API budget (~$0.01 per run) so we never auto-run it.
# Available on tag pipelines as a manual button : an operator clicks it
# AFTER setting `ANTHROPIC_API_KEY_SMOKE` as a protected GitLab CI variable.
#
# Scope (v0.4) : runs `claude -p "..."` against the just-built agent image
# WITHOUT the broker/sidecars/Cerbos. Proves the agent image can reach
# api.anthropic.com end-to-end with a real key. Doesn't prove the L1 gate
# (audit-demo already does that). v0.4.1 ticket : full-stack smoke that
# also boots cerbos + sidecars + broker for a true end-to-end validation.
# ---------------------------------------------------------------------------

smoke:llm-real:
  stage: smoke
  image: docker:24-cli
  rules:
    # v0.5 (ADR-0030 amendment) — auto-run on tag IF the operator has set
    # ANTHROPIC_API_KEY_SMOKE as a protected GitLab CI variable. If unset,
    # the rule evaluates falsy and the job is skipped entirely (no noisy
    # "failed" allow_failure entry on the pipeline). When set, the smoke
    # runs end-to-end against api.anthropic.com on every release ; ~$0.01
    # per tag pipeline. Operator commits to that budget by setting the
    # variable in the first place — the per-tag burn is an explicit choice.
    - if: $CI_COMMIT_TAG && $ANTHROPIC_API_KEY_SMOKE
  needs:
    - build:image
    - job: build:image:manifest
      optional: true
  variables:
    DOCKER_HOST: "unix:///var/run/docker.sock"
  script:
    - |
      if [ -z "${ANTHROPIC_API_KEY_SMOKE:-}" ]; then
        echo ""
        echo "FATAL: ANTHROPIC_API_KEY_SMOKE protected variable is not set."
        echo ""
        echo "To enable this smoke :"
        echo "  1. Settings → CI/CD → Variables → Add"
        echo "       Key      : ANTHROPIC_API_KEY_SMOKE"
        echo "       Value    : (an Anthropic API key with budget for smoke runs)"
        echo "       Protect  : true   (only available on protected refs / tags)"
        echo "       Mask     : true   (redacted from job logs)"
        echo "  2. Re-trigger this manual job."
        echo ""
        exit 1
      fi
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker pull "$CI_REGISTRY_IMAGE/claude-code:$CI_COMMIT_SHA"
    # Run claude with the operator's API key. The agent container has the
    # hook wired but no broker is reachable here — `host.docker.internal:8765`
    # returns connection-refused, the hook fails closed (ADR-0009), and
    # claude refuses every tool call. So we send a no-tool prompt that
    # claude can answer from its own model state without invoking Read /
    # Bash / WebFetch.
    - >
      OUTPUT=$(docker run --rm
      -e ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY_SMOKE"
      "$CI_REGISTRY_IMAGE/claude-code:$CI_COMMIT_SHA"
      claude -p "Respond with exactly one word: pong" 2>&1)
      || { echo "claude exec failed: $OUTPUT" ; exit 1 ; }
      echo "Claude said: $OUTPUT"
      echo "$OUTPUT" | grep -qi "pong" || { echo "expected 'pong' in response"; exit 1; }
    - echo "✓ real-LLM smoke green — agent reached api.anthropic.com end-to-end"
