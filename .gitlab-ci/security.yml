---
# Security stage (ADR-0017) — every release must pass these gates.
# A red job here blocks `publish` and `release` per ADR-0014.
# Each scanner uses its dedicated image — no per-job tool install.

# Reusable cache for jobs that uv-sync (bandit, pip-audit)
.uv-sec:
  stage: security
  image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
  cache:
    - key:
        files: [uv.lock]
      paths: [.venv/, .uv-cache/]
      policy: pull-push
  before_script:
    - uv sync --all-extras --frozen

# ---------------------------------------------------------------------------
# Python static security smell (bandit) + dep CVE (pip-audit)
# ---------------------------------------------------------------------------

security:bandit:
  extends: .uv-sec
  script:
    - uv run bandit -r src/ -c pyproject.toml --quiet

security:pip-audit:
  extends: .uv-sec
  cache:
    - key:
        files: [uv.lock]
      paths: [.venv/, .uv-cache/]
      policy: pull-push
    - key: pip-audit-cache
      paths: [.cache-pip-audit/]
      policy: pull-push
  script:
    - mkdir -p .cache-pip-audit
    - uv run pip-audit --skip-editable --cache-dir .cache-pip-audit

# ---------------------------------------------------------------------------
# Secret scan (gitleaks)
# ---------------------------------------------------------------------------

security:gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --source . --no-git --redact --report-path gitleaks.json
  artifacts:
    when: always
    paths: [gitleaks.json]
    expire_in: 30 days

# ---------------------------------------------------------------------------
# Filesystem multi-faceted scan (trivy)
# ---------------------------------------------------------------------------

security:trivy:
  stage: security
  image:
    name: aquasec/trivy:0.69.3
    entrypoint: [""]
  cache:
    - key: trivy-db
      paths: [.cache-trivy/]
      policy: pull-push
  script:
    - mkdir -p .cache-trivy
    - >
      trivy fs --scanners vuln,secret,config
      --severity HIGH,CRITICAL
      --exit-code 1
      --cache-dir .cache-trivy
      --format json
      --output trivy.json
      .
  artifacts:
    when: always
    paths: [trivy.json]
    expire_in: 30 days

# ---------------------------------------------------------------------------
# Dep CVE cross-check (grype)
# ---------------------------------------------------------------------------

security:grype:
  # anchore/grype image is distroless (no sh) — install the binary in alpine
  stage: security
  image: alpine:latest
  cache:
    - key: grype-db
      paths: [.cache-grype/]
      policy: pull-push
  script:
    - apk add --no-cache curl
    # Retry the install : GitHub Releases CDN occasionally serves 502 ;
    # this is transient and silently fixed by retrying. Real install
    # errors will propagate after 3 attempts.
    - |
      for i in 1 2 3; do
        if curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin; then
          break
        fi
        echo "grype install attempt $i failed (probably transient GitHub 5xx) — retrying in 10s"
        sleep 10
        [ "$i" = "3" ] && exit 1
      done
    - "GRYPE_DB_CACHE_DIR=.cache-grype grype dir:. --fail-on high --output json --file grype.json"
  artifacts:
    when: always
    paths: [grype.json]
    expire_in: 30 days

# ---------------------------------------------------------------------------
# SBOM (SPDX) — published as release artifact (ADR-0016)
# ---------------------------------------------------------------------------

security:sbom:
  # anchore/syft image is distroless (no sh) — install the binary in alpine
  stage: security
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - |
      for i in 1 2 3; do
        if curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin; then
          break
        fi
        echo "syft install attempt $i failed (probably transient GitHub 5xx) — retrying in 10s"
        sleep 10
        [ "$i" = "3" ] && exit 1
      done
    - "syft scan dir:. -o spdx-json=sbom.spdx.json"
  artifacts:
    paths: [sbom.spdx.json]
    expire_in: 1 year   # Long retention — used for retroactive CVE scans
