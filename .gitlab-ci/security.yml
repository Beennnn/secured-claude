---
# Security stage (ADR-0017) — every release must pass these gates.
# A red job here blocks `publish` and `release` per ADR-0014.

# Anchor for jobs that need the scan-DB cache (~/.cache/secured-claude-scan/)
.security-base: &security-base
  stage: security
  cache:
    - key:
        files: [uv.lock]
      paths: [.venv/, .uv-cache/]
      policy: pull-push
    - key: scan-dbs-v1
      paths: [.cache-scan/]
      policy: pull-push
  before_script:
    - export PATH="$HOME/.local/bin:/opt/homebrew/bin:$PATH"
    - export SCAN_CACHE_ROOT="$PWD/.cache-scan"

# ---------------------------------------------------------------------------
# Python static security smell (bandit) + dep CVE (pip-audit)
# ---------------------------------------------------------------------------

security:bandit:
  <<: *security-base
  script:
    - uv sync --all-extras
    - uv run bandit -r src/ -c pyproject.toml --quiet

security:pip-audit:
  <<: *security-base
  script:
    - uv sync --all-extras
    - mkdir -p "${SCAN_CACHE_ROOT}/pip-audit"
    - uv run pip-audit --skip-editable --cache-dir "${SCAN_CACHE_ROOT}/pip-audit"

# ---------------------------------------------------------------------------
# Secret scan
# ---------------------------------------------------------------------------

security:gitleaks:
  <<: *security-base
  script:
    - gitleaks detect --source . --no-git --redact --report-path gitleaks.json
  artifacts:
    when: always
    paths: [gitleaks.json]
    expire_in: 30 days

# ---------------------------------------------------------------------------
# Filesystem multi-faceted scan (trivy)
# ---------------------------------------------------------------------------

security:trivy:
  <<: *security-base
  script:
    - mkdir -p "${SCAN_CACHE_ROOT}/trivy"
    - trivy fs --scanners vuln,secret,config
        --severity HIGH,CRITICAL
        --exit-code 1
        --cache-dir "${SCAN_CACHE_ROOT}/trivy"
        --format json
        --output trivy.json
        .
  artifacts:
    when: always
    paths: [trivy.json]
    expire_in: 30 days

# ---------------------------------------------------------------------------
# Dep CVE cross-check (grype)
# ---------------------------------------------------------------------------

security:grype:
  <<: *security-base
  script:
    - mkdir -p "${SCAN_CACHE_ROOT}/grype"
    - GRYPE_DB_CACHE_DIR="${SCAN_CACHE_ROOT}/grype"
        grype dir:. --fail-on high --output json --file grype.json
  artifacts:
    when: always
    paths: [grype.json]
    expire_in: 30 days

# ---------------------------------------------------------------------------
# SBOM (SPDX) — published as release artifact (ADR-0016)
# ---------------------------------------------------------------------------

security:sbom:
  stage: security
  script:
    - syft scan dir:. -o spdx-json=sbom.spdx.json --quiet
    - jq '{packages: (.packages | length), files: ((.files // []) | length)}' sbom.spdx.json
  artifacts:
    paths: [sbom.spdx.json]
    expire_in: 1 year   # Long retention — used for retroactive CVE scans

# ---------------------------------------------------------------------------
# Audit demonstration — runs the full bin/security-scans.sh end-to-end so a
# "red-team" finding (audit-demo failure when implemented) blocks the release
# ---------------------------------------------------------------------------

security:full-audit:
  <<: *security-base
  script:
    - uv sync --all-extras
    - bash bin/security-scans.sh
  artifacts:
    when: always
    paths: [audit-reports/]
    expire_in: 90 days
