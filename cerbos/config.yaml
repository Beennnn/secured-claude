---
# Cerbos PDP runtime configuration.
# Mounted into the Cerbos container at /etc/cerbos/config.yaml.
# Reference: https://docs.cerbos.dev/cerbos/latest/configuration/

server:
  httpListenAddr: ":3592"
  grpcListenAddr: ":3593"
  # The PDP listens on all interfaces inside the container ; the host-side
  # broker connects via 127.0.0.1:3592 once the container port is published.

storage:
  driver: disk
  disk:
    directory: /policies
    watchForChanges: true   # hot-reload policies on file change (dev convenience)

audit:
  enabled: true
  backend: local
  local:
    storagePath: /var/cerbos/audit
    retentionPeriod: 168h   # 7 days — secondary audit, primary lives in our SQLite

schema:
  enforcement: warn
  # v0.1 doesn't ship JSON schemas yet ; v0.2 will and we'll bump to "reject".

compile:
  cacheDuration: 60s
