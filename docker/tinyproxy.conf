# L2 egress filter for secured-claude — ADR-0019
#
# tinyproxy in CONNECT-only mode with allowlist filtering. The agent
# container's HTTPS_PROXY points here ; tinyproxy validates the destination
# host against /etc/tinyproxy/filter.txt and either tunnels (allowlisted)
# or refuses (default-deny per FilterDefaultDeny Yes).
#
# This proxy does NOT do TLS termination — CONNECT tunnels stay end-to-end
# encrypted to the destination. We see the destination host (from CONNECT
# host:port) but never the request bodies.

User tinyproxy
Group tinyproxy

# Listen on port 3128 on all interfaces inside the container.
Port 3128
Listen 0.0.0.0

# Run in foreground so docker-compose picks up the process and respects
# the healthcheck. Without this tinyproxy daemonises and the container
# would be considered "stopped".
Timeout 600

# Default ACL : reject all client connections except from our docker
# network (the agent container) + container loopback (for healthcheck).
Allow 172.30.42.0/29
Allow 127.0.0.1

# CONNECT method is the only one we use (HTTPS tunnels). Drop GET/POST
# proxying since we don't proxy HTTP — the agent only talks HTTPS to
# api.anthropic.com.
DisableViaHeader Yes

# CONNECT can target port 443 (HTTPS). Block everything else.
ConnectPort 443

# Filter: hostname allowlist with default-deny.
Filter "/etc/tinyproxy/filter.txt"
FilterDefaultDeny Yes
FilterURLs Off
# FilterType options : bre (basic regex, default), ere (extended), fnmatch.
# Our patterns ^api\.anthropic\.com$ + ^.*\.anthropic\.com$ work with bre.
FilterType bre
FilterCaseSensitive Off

# Logging : per-connection line to stdout. The line includes the
# destination host, so audit/observability tooling can correlate this
# with the L1 (Cerbos) audit log by timestamp + principal.
# tinyproxy logs to stderr/stdout when no LogFile is set AND Syslog Off.
LogLevel Connect
Syslog Off

# Cap concurrent connections — the agent should never have many open
# sessions to anthropic.com simultaneously.
MaxClients 16
