# L3 DNS allowlist for secured-claude — ADR-0020
#
# dnsmasq in forwarder mode with `no-resolv` : queries are forwarded to
# upstream public DNS (1.1.1.1 / 8.8.8.8) ONLY for hostnames matching an
# explicit `server=/<domain>/<upstream>` rule. Everything else returns
# SERVFAIL/REFUSED — the agent literally can't resolve evil.com to learn
# its IP, even before the L2 proxy refuses the connection.
#
# Closes the R-DNS-LEAK risk from the threat model : a compromised agent
# could otherwise leak destination intent to evil.com's authoritative DNS
# server even if it never connects.
#
# The agent's /etc/resolv.conf points exclusively at this dnsmasq's static
# IP (172.30.42.3) via the docker-compose `dns:` directive. Docker's
# default 127.0.0.11 resolver is bypassed.

# Listen on 0.0.0.0:53 inside the container — the agent reaches us via
# our static IP on the secured-claude-net subnet.
listen-address=0.0.0.0
port=53

# No system resolv.conf, no polling for changes, no /etc/hosts inheritance.
# Default-deny posture : a query with no matching `server=` rule has no
# upstream to forward to, so dnsmasq returns SERVFAIL.
no-resolv
no-poll
no-hosts

# Allowlist : Anthropic API + a couple of CDN parents.
# Public DNS upstreams (Cloudflare 1.1.1.1, Google 8.8.8.8) — both are
# queried in parallel for resilience. Renovate-tracked here as plaintext.
server=/anthropic.com/1.1.1.1
server=/anthropic.com/8.8.8.8

# Logging : per-query line to stdout. Useful for investigating "why did
# my prompt fail" — a SERVFAIL for evil.com is a deliberate block, not
# a network outage.
log-queries
log-facility=-

# Cache hits — repeat queries for api.anthropic.com (every Claude API
# call) hit the cache instead of round-tripping to 1.1.1.1.
cache-size=1024

# Don't bind to wildcard for IPv6 we don't need.
bind-interfaces

# Drop the daemon-only behaviour ; we want dnsmasq in foreground for the
# container.
keep-in-foreground
